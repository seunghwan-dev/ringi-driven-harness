<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" width="560" role="img" aria-labelledby="title desc">
<title id="title">ringi-driven-harness operating modes</title>
<desc id="desc">Three operating modes — synchronous (the human at the terminal), remote dispatch (the human, remote), and autonomous (the cloud) — all converge on one pipeline: an automated check (CI), an advisory AI review, and a human merge gate where the human approves before a change ships. Human steps and the gate are coral, cloud-autonomous steps are purple.</desc>
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  .bg-human { fill:#FAECE7; stroke:#993C1D; }
  .bg-cloud { fill:#EEEDFE; stroke:#534AB7; }
  .bg-art   { fill:#F1EFE8; stroke:#5F5E5A; }
  .t-human  { fill:#712B13; }
  .t-cloud  { fill:#3C3489; }
  .t-art    { fill:#444441; }
  .t-sub    { fill:#5F5E5A; }
  .edge     { stroke:#888780; }
  @media (prefers-color-scheme: dark) {
    .bg-human { fill:#712B13; stroke:#F0997B; }
    .bg-cloud { fill:#3C3489; stroke:#AFA9EC; }
    .bg-art   { fill:#444441; stroke:#B4B2A9; }
    .t-human  { fill:#F5C4B3; }
    .t-cloud  { fill:#CECBF6; }
    .t-art    { fill:#D3D1C7; }
    .t-sub    { fill:#B4B2A9; }
    .edge     { stroke:#9C9A92; }
  }
</style>
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect class="bg-human" x="40" y="14" width="12" height="12" rx="3" stroke-width="0.5"/>
<text class="t-sub" x="58" y="20" font-size="12" dominant-baseline="central">human</text>
<rect class="bg-cloud" x="150" y="14" width="12" height="12" rx="3" stroke-width="0.5"/>
<text class="t-sub" x="168" y="20" font-size="12" dominant-baseline="central">cloud (PC off)</text>

<rect class="bg-human" x="24" y="64" width="190" height="52" rx="8" stroke-width="0.5"/>
<text class="t-human" x="119" y="84" font-size="14" font-weight="500" text-anchor="middle" dominant-baseline="central">Synchronous</text>
<text class="t-sub" x="119" y="101" font-size="12" text-anchor="middle" dominant-baseline="central">you at the terminal</text>

<rect class="bg-human" x="24" y="132" width="190" height="52" rx="8" stroke-width="0.5"/>
<text class="t-human" x="119" y="152" font-size="14" font-weight="500" text-anchor="middle" dominant-baseline="central">Remote / dispatch</text>
<text class="t-sub" x="119" y="169" font-size="12" text-anchor="middle" dominant-baseline="central">bounded task · run remotely</text>

<rect class="bg-cloud" x="24" y="200" width="190" height="52" rx="8" stroke-width="0.5"/>
<text class="t-cloud" x="119" y="220" font-size="14" font-weight="500" text-anchor="middle" dominant-baseline="central">Autonomous</text>
<text class="t-sub" x="119" y="237" font-size="12" text-anchor="middle" dominant-baseline="central">schedule or trigger · PC off</text>

<line class="edge" x1="214" y1="90"  x2="300" y2="90" stroke-width="1"/>
<line class="edge" x1="214" y1="158" x2="300" y2="90" stroke-width="1"/>
<line class="edge" x1="214" y1="226" x2="300" y2="90" stroke-width="1"/>
<line class="edge" x1="300" y1="90"  x2="330" y2="90" stroke-width="1" marker-end="url(#a)"/>

<rect class="bg-cloud" x="330" y="64" width="200" height="52" rx="8" stroke-width="0.5"/>
<text class="t-cloud" x="430" y="84" font-size="14" font-weight="500" text-anchor="middle" dominant-baseline="central">Automated check</text>
<text class="t-sub" x="430" y="101" font-size="12" text-anchor="middle" dominant-baseline="central">CI · gitleaks · tests</text>
<line class="edge" x1="430" y1="116" x2="430" y2="148" stroke-width="1" marker-end="url(#a)"/>

<rect class="bg-cloud" x="330" y="148" width="200" height="52" rx="8" stroke-width="0.5"/>
<text class="t-cloud" x="430" y="168" font-size="14" font-weight="500" text-anchor="middle" dominant-baseline="central">AI review</text>
<text class="t-sub" x="430" y="185" font-size="12" text-anchor="middle" dominant-baseline="central">@claude · advisory</text>
<line class="edge" x1="430" y1="200" x2="430" y2="232" stroke-width="1" marker-end="url(#a)"/>

<rect class="bg-human" x="330" y="232" width="200" height="52" rx="8" stroke-width="1.5"/>
<text class="t-human" x="430" y="252" font-size="14" font-weight="500" text-anchor="middle" dominant-baseline="central">Human merge</text>
<text class="t-sub" x="430" y="269" font-size="12" text-anchor="middle" dominant-baseline="central">ringi · approve → ships</text>

<text class="t-sub" x="280" y="312" font-size="13" text-anchor="middle" dominant-baseline="central">Any mode → one gate.</text>
</svg>
