# Reference nightly autonomous-build workflow for a ringi-driven-harness project.
# Copy to .github/workflows/nightly.yml and adapt cron, model, and the prompt to your repo.
# The agent runs unattended, picks a labeled issue, implements it on a branch, and PUSHES
# THE BRANCH — it does not open a PR. A human opens the PR in the morning, so CI (verify)
# runs on a human-opened PR and branch protection / final control are preserved.
#
# The agent needs file-editing and git tools, which are NOT in the default allowlist;
# they are granted via claude_args --allowedTools below.

name: nightly-autonomous-build

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: read
  id-token: write

concurrency:
  group: nightly-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: >-
            --max-turns 15
            --model claude-opus-4-7
            --allowedTools "Edit,Write,MultiEdit,Read,Glob,Grep,Bash(git:*),Bash(gh:*)"
          prompt: |
            You are running as an UNATTENDED nightly build. No human is watching during the run.

            1. Use gh to find the oldest OPEN issue labeled "nightly-ready". If none exists, STOP — do nothing.
            2. Let N be that issue's number. If a remote branch "nightly/issue-N" already exists, STOP — it was built on a previous night.
            3. Read the issue and the repo's CLAUDE.md for the rules you must follow.
            4. Create a new branch nightly/issue-N.
            5. Implement ONLY what the issue asks. Keep the change minimal and focused.
            6. If a test command exists, run it and make it pass.
            7. Commit (English message, NO AI co-author) and push the branch nightly/issue-N to origin.
            8. Do NOT create a pull request. Do NOT merge. A human will open the PR in the morning.
            9. NEVER push to main. NEVER force-push.
