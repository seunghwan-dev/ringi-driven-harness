# Reference CI for a ringi-driven-harness project.
# Copy to .github/workflows/ci.yml and adapt to your stack.
# Every pull request must pass before it reaches the human merge gate:
# secret scan first, then lint / type-check / unit tests, then end-to-end checks.
# Register this workflow as a required status check in branch protection —
# otherwise the gate has no teeth, and a red run would not block the merge.

name: ci

on:
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history, required for secret scanning

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2

